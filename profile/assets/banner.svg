<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 1200 360">
  <title id="title">Worxbend street-art banner</title>
  <desc id="desc">A street-art graffiti banner on a dark brick wall with a large Worxbend tag, paint drips, stickers, and spray marks.</desc>
  <defs>
