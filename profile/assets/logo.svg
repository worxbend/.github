<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 256 256">
  <title id="title">Worxbend graffiti logo</title>
  <desc id="desc">A graffiti-style WXB tag with colorful paint strokes on a dark wall.</desc>
  <defs>
    <linearGradient id="wall" x1="18" y1="10" x2="238" y2="246" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#151922"/>
