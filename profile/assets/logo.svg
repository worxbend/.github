<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 256 256">
  <title id="title">Worxbend blueprint logo</title>
  <desc id="desc">A blueprint-style WXB logo with drafting grid, measurement lines, schematic marks, and cyan technical drawing strokes.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#061a35"/>
      <stop offset="0.54" stop-color="#09284e"/>
      <stop offset="1" stop-color="#041326"/>
    </linearGradient>
    <pattern id="smallGrid" width="12" height="12" patternUnits="userSpaceOnUse">
      <path d="M12 0H0v12" fill="none" stroke="#75d9ff" stroke-opacity="0.14" stroke-width="1"/>
    </pattern>
    <pattern id="largeGrid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0v48" fill="none" stroke="#a8efff" stroke-opacity="0.22" stroke-width="1.2"/>
    </pattern>
    <filter id="paperNoise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="2" seed="91" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
    </filter>
    <filter id="inkGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#7ce7ff" flood-opacity="0.75"/>
    </filter>
    <marker id="arrow" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto">
      <path d="M0 0l7 3.5L0 7z" fill="#a8efff"/>
    </marker>
  </defs>

  <rect width="256" height="256" rx="30" fill="url(#paper)"/>
  <rect width="256" height="256" rx="30" fill="url(#smallGrid)"/>
  <rect width="256" height="256" rx="30" fill="url(#largeGrid)"/>
  <rect width="256" height="256" rx="30" filter="url(#paperNoise)" opacity="0.8"/>

  <g fill="none" stroke="#d8fbff" stroke-opacity="0.42" stroke-width="1.2">
    <path d="M24 24h208v208H24z"/>
    <path d="M36 36h184v184H36z" stroke-dasharray="7 6"/>
    <path d="M128 12v232M12 128h232"/>
    <circle cx="128" cy="128" r="78"/>
    <circle cx="128" cy="128" r="55" stroke-dasharray="6 7"/>
  </g>

  <g fill="none" stroke="#55dbff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#inkGlow)">
    <path d="M49 78l24 102 28-66 28 66 24-102"/>
    <path d="M78 78l25 102"/>
    <path d="M153 78h32c24 0 38 12 38 31 0 12-7 22-20 27 16 4 25 16 25 32 0 21-15 34-42 34h-33z"/>
    <path d="M178 101v24h12c10 0 16-4 16-12s-6-12-16-12z"/>
    <path d="M178 154v25h14c11 0 17-5 17-13s-6-12-17-12z"/>
    <path d="M105 88l51 104M156 88l-51 104"/>
  </g>

  <g fill="none" stroke="#d8fbff" stroke-width="1.5" stroke-linecap="round" opacity="0.9">
    <path d="M46 64h164" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <path d="M46 207h164" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <path d="M34 78h24M34 180h24M198 78h24M198 180h24"/>
    <path d="M58 78V64M198 78V64M58 180v27M198 180v27"/>
  </g>

  <g font-family="Noto Sans Mono, ui-monospace, monospace" fill="#a8efff" font-size="12" opacity="0.9">
    <text x="37" y="31">WXB-MARK</text>
    <text x="150" y="31">REV 01</text>
    <text x="61" y="226">WORXBEND</text>
    <text x="34" y="139" transform="rotate(-90 34 139)">GRID 12</text>
    <text x="224" y="119" transform="rotate(90 224 119)">1:1</text>
  </g>

  <g fill="#d8fbff" opacity="0.8">
    <circle cx="128" cy="128" r="3"/>
    <circle cx="58" cy="78" r="2.4"/>
    <circle cx="198" cy="180" r="2.4"/>
    <circle cx="36" cy="36" r="2.2"/>
    <circle cx="220" cy="220" r="2.2"/>
  </g>
</svg>
