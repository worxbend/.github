      <stop offset="0.45" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#1f1b2e"/>
    </linearGradient>
    <linearGradient id="tag" x1="130" y1="95" x2="1080" y2="242" gradientUnits="userSpaceOnUse">
