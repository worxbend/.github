<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 1200 360">
  <title id="title">Worxbend profile banner</title>
  <desc id="desc">A clean technical banner for Worxbend with a geometric W mark, workstation-inspired grid lines, and labels for learning projects, Linux tools, and open source notes.</desc>
  <defs>
    <linearGradient id="backdrop" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="0.48" stop-color="#102235"/>
      <stop offset="1" stop-color="#14131f"/>
    </linearGradient>
    <linearGradient id="surface" x1="155" y1="70" x2="1015" y2="318" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#13283c" stop-opacity="0.94"/>
      <stop offset="0.55" stop-color="#111827" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#221827" stop-opacity="0.94"/>
    </linearGradient>
    <linearGradient id="accent" x1="218" y1="82" x2="380" y2="236" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#23d3c3"/>
      <stop offset="0.48" stop-color="#4f8cff"/>
      <stop offset="1" stop-color="#ff5f8f"/>
    </linearGradient>
    <linearGradient id="accentWide" x1="112" y1="60" x2="1096" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#23d3c3"/>
      <stop offset="0.48" stop-color="#4f8cff"/>
      <stop offset="1" stop-color="#ffb454"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0v48" fill="none" stroke="#d8e8ff" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <pattern id="pinGrid" width="88" height="88" patternUnits="userSpaceOnUse">
      <circle cx="7" cy="7" r="1.6" fill="#d8e8ff" opacity="0.24"/>
    </pattern>
    <filter id="softShadow" x="-10%" y="-14%" width="120%" height="128%">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
    <filter id="markShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="13" stdDeviation="10" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#backdrop)"/>
  <rect width="1200" height="360" rx="28" fill="url(#grid)"/>
  <rect width="1200" height="360" rx="28" fill="url(#pinGrid)" opacity="0.65"/>

  <path d="M-26 320C140 216 256 214 392 287c121 65 250 54 389-34 150-96 300-105 465-28v135H-26z" fill="#22d3ee" opacity="0.08"/>
  <path d="M-30 80c172-45 310-39 415 19 98 54 210 58 337 10 154-58 304-49 508 45V0H-30z" fill="#ff5f8f" opacity="0.08"/>
  <path d="M102 61h996" stroke="url(#accentWide)" stroke-width="2" stroke-linecap="round" opacity="0.88"/>

  <g filter="url(#softShadow)">
    <path d="M92 92c0-18 14-32 32-32h952c18 0 32 14 32 32v176c0 18-14 32-32 32H124c-18 0-32-14-32-32z" fill="url(#surface)" stroke="#d8e8ff" stroke-opacity="0.12"/>
    <path d="M126 267h948" stroke="#d8e8ff" stroke-opacity="0.12" stroke-width="1"/>
    <path d="M435 92v176" stroke="#d8e8ff" stroke-opacity="0.10" stroke-width="1"/>
  </g>

  <g transform="translate(144 98)" filter="url(#markShadow)">
    <rect x="0" y="0" width="246" height="164" rx="28" fill="#07111f" stroke="#d8e8ff" stroke-opacity="0.13"/>
    <path d="M28 122 59 42h33l31 64 31-64h33l31 80h-33l-17-45-24 45h-40L80 77l-17 45z" fill="url(#accent)"/>
    <path d="M28 122 59 42h33l31 64 31-64h33l31 80" fill="none" stroke="#f8fbff" stroke-width="8" stroke-linejoin="round" stroke-linecap="round" opacity="0.88"/>
    <path d="M42 29h56M164 135h43M188 31h26M30 143h28" stroke="#ffb454" stroke-width="5" stroke-linecap="round"/>
    <circle cx="58" cy="31" r="5" fill="#23d3c3"/>
    <circle cx="207" cy="135" r="5" fill="#ff5f8f"/>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="486" y="152" fill="#f8fbff" font-size="72" font-weight="800" letter-spacing="0">Worxbend</text>
    <text x="491" y="194" fill="#b9c8da" font-size="25" font-weight="600" letter-spacing="0">Learning projects, Linux tools, and practical experiments.</text>
    <g font-size="17" font-weight="800" letter-spacing="1.6">
      <rect x="488" y="223" width="216" height="34" rx="17" fill="#23d3c3" opacity="0.14"/>
      <text x="508" y="246" fill="#7de8df">LEARNING PROJECTS</text>
      <rect x="726" y="223" width="150" height="34" rx="17" fill="#4f8cff" opacity="0.15"/>
      <text x="746" y="246" fill="#9fc1ff">LINUX TOOLS</text>
      <rect x="898" y="223" width="203" height="34" rx="17" fill="#ffb454" opacity="0.14"/>
      <text x="918" y="246" fill="#ffd08a">OPEN SOURCE NOTES</text>
    </g>
  </g>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.62">
    <path d="M969 108h52l24 24h40" stroke="#23d3c3" stroke-width="4"/>
    <path d="M963 291h71l23-25h36" stroke="#ff5f8f" stroke-width="4"/>
    <path d="M92 110h41l24-24h50" stroke="#ffb454" stroke-width="4"/>
    <path d="M155 300h85l30-30h46" stroke="#4f8cff" stroke-width="4"/>
  </g>
</svg>
