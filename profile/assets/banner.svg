<svg xmlns="http://www.w3.org/2000/svg" aria-labelledby="title desc" role="img" viewBox="0 0 1200 360"><title id="title">Worxbend profile banner</title><desc id="desc">A clean technical banner for Worxbend with a geometric W mark, workstation-inspired grid lines, and labels for learning projects, Linux tools, and open source notes.</desc><defs><linearGradient id="backdrop" x1="0" x2="1200" y1="0" y2="360" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#08111f"/><stop offset=".48" stop-color="#102235"/><stop offset="1" stop-color="#14131f"/></linearGradient><linearGradient id="surface" x1="155" x2="1015" y1="70" y2="318" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#13283c" stop-opacity=".94"/><stop offset=".55" stop-color="#111827" stop-opacity=".96"/><stop offset="1" stop-color="#221827" stop-opacity=".94"/></linearGradient><linearGradient id="accent" x1="218" x2="380" y1="82" y2="236" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#23d3c3"/><stop offset=".48" stop-color="#4f8cff"/><stop offset="1" stop-color="#ff5f8f"/></linearGradient><linearGradient id="accentWide" x1="112" x2="1096" y1="60" y2="60" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#23d3c3"/><stop offset=".48" stop-color="#4f8cff"/><stop offset="1" stop-color="#ffb454"/></linearGradient><pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse"><path fill="none" stroke="#d8e8ff" stroke-opacity=".055" stroke-width="1" d="M48 0H0v48"/></pattern><pattern id="pinGrid" width="88" height="88" patternUnits="userSpaceOnUse"><circle cx="7" cy="7" r="1.6" fill="#d8e8ff" opacity=".24"/></pattern><filter id="softShadow" width="120%" height="128%" x="-10%" y="-14%"><feDropShadow dx="0" dy="20" flood-color="#020617" flood-opacity=".42" stdDeviation="20"/></filter><filter id="markShadow" width="140%" height="140%" x="-20%" y="-20%"><feDropShadow dx="0" dy="13" flood-color="#020617" flood-opacity=".45" stdDeviation="10"/></filter></defs><rect width