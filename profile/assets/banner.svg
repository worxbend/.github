<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 1200 360">
  <title id="title">Worxbend blueprint banner</title>
  <desc id="desc">A technical blueprint-style banner with Worxbend lettering, drafting grid, measurement marks, circuit traces, Linux tooling notes, and schematic panels.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#061a35"/>
      <stop offset="0.48" stop-color="#09284e"/>
      <stop offset="1" stop-color="#041326"/>
    </linearGradient>
    <pattern id="smallGrid" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M16 0H0v16" fill="none" stroke="#75d9ff" stroke-opacity="0.12" stroke-width="1"/>
    </pattern>
    <pattern id="largeGrid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0v80" fill="none" stroke="#a8efff" stroke-opacity="0.22" stroke-width="1.4"/>
    </pattern>
    <filter id="paperNoise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="2" seed="67" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
    </filter>
    <filter id="inkGlow" x="-10%" y="-25%" width="120%" height="150%">
      <feDropShadow dx="0" dy="0" stdDeviation="2.2" flood-color="#7ce7ff" flood-opacity="0.7"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0 0l8 4-8 4z" fill="#a8efff"/>
    </marker>
    <marker id="dot" markerWidth="8" markerHeight="8" refX="4" refY="4">
      <circle cx="4" cy="4" r="2.4" fill="#a8efff"/>
    </marker>
  </defs>

  <rect width="1200" height="360" rx="22" fill="url(#paper)"/>
  <rect width="1200" height="360" rx="22" fill="url(#smallGrid)"/>
  <rect width="1200" height="360" rx="22" fill="url(#largeGrid)"/>
  <rect width="1200" height="360" rx="22" filter="url(#paperNoise)" opacity="0.8"/>

  <g fill="none" stroke="#d8fbff" stroke-opacity="0.36" stroke-width="1.3">
    <path d="M36 36h1128v288H36z"/>
    <path d="M52 52h1096v256H52z" stroke-dasharray="10 8"/>
    <path d="M88 0v360M1112 0v360M0 88h1200M0 272h1200"/>
    <path d="M168 36v288M1032 36v288M36 168h1128"/>
  </g>

  <g font-family="Noto Sans Mono, ui-monospace, monospace" fill="#d8fbff" opacity="0.78" font-size="16">
    <text x="54" y="29">WORXBEND / PROFILE HEADER / REV BLUEPRINT-01</text>
    <text x="888" y="29">UNITS: PX   SCALE: 1:1   GRID: 16</text>
    <text x="54" y="346">LEARNING PROJECTS</text>
    <text x="448" y="346">PERSONAL LINUX TOOLS</text>
    <text x="854" y="346">ROUGH EDGES WELCOME</text>
  </g>

  <g fill="none" stroke="#a8efff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
    <path d="M114 72h210v78H114z"/>
    <path d="M130 90h54m-54 18h142m-142 18h102"/>
    <path d="M128 204h178v78H128z"/>
    <path d="M146 250l34-26 30 18 44-38 30 22"/>
    <path d="M906 70h188v92H906z"/>
    <path d="M932 116h34v-22h56v44h44"/>
    <path d="M914 220h72v-44h78v44h52v62H914z"/>
    <path d="M946 252h44m28 0h54"/>
  </g>

  <g fill="none" stroke="#55dbff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#inkGlow)">
    <path d="M332 118h65l32 74 32-74h57l-64 128h-52z"/>
    <path d="M542 118h82c43 0 69 23 69 60s-26 60-69 60h-82z"/>
    <path d="M590 151v54h30c20 0 31-10 31-27s-11-27-31-27z"/>
    <path d="M722 118h61l38 42 38-42h63l-65 62 70 66h-66l-42-46-43 46h-64l70-66z"/>
  </g>

  <g font-family="Noto Sans, Arial, sans-serif" font-weight="900" text-anchor="middle" filter="url(#inkGlow)">
    <text x="606" y="202" fill="#d8fbff" stroke="#d8fbff" stroke-width="2" font-size="96" letter-spacing="1">Worxbend</text>
    <text x="606" y="202" fill="none" stroke="#37c9ff" stroke-width="1.4" font-size="96" letter-spacing="1">Worxbend</text>
  </g>

  <g fill="none" stroke="#d8fbff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.82">
    <path d="M286 104h658"/>
    <path d="M286 256h658"/>
    <path d="M314 94v28m600-28v28M314 242v28m600-28v28"/>
    <path d="M314 92h600" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <path d="M314 270h600" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <path d="M264 130l-82 54 82 54"/>
    <path d="M936 130l82 54-82 54"/>
    <path d="M502 88c32-25 69-38 111-38 48 0 89 17 123 50" stroke-dasharray="7 7"/>
    <path d="M474 286c44 20 91 30 141 30 44 0 84-8 120-24" stroke-dasharray="7 7"/>
  </g>

  <g fill="none" stroke="#a8efff" stroke-width="2" opacity="0.84" marker-start="url(#dot)" marker-end="url(#dot)">
    <path d="M604 64v42"/>
    <path d="M604 254v42"/>
    <path d="M372 184H278"/>
    <path d="M830 184h92"/>
  </g>

  <g font-family="Noto Sans Mono, ui-monospace, monospace" fill="#a8efff" font-size="14" opacity="0.9">
    <text x="396" y="86">main wordmark envelope</text>
    <text x="744" y="286">open source build zone</text>
    <text x="92" y="184" transform="rotate(-90 92 184)">prototype lane</text>
    <text x="1122" y="184" transform="rotate(90 1122 184)">tools lane</text>
    <text x="920" y="188">repo systems</text>
  </g>

  <g fill="#d8fbff" opacity="0.72">
    <circle cx="604" cy="184" r="3"/>
    <circle cx="278" cy="184" r="3"/>
    <circle cx="922" cy="184" r="3"/>
    <circle cx="114" cy="72" r="3"/>
    <circle cx="1094" cy="282" r="3"/>
  </g>
</svg>
