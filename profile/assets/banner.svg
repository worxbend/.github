<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 1200 360">
  <title id="title">Worxbend profile banner</title>
  <desc id="desc">A minimal banner for Worxbend with the logo and name.</desc>
  <defs>
    <linearGradient id="backdrop" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="0.48" stop-color="#102235"/>
      <stop offset="1" stop-color="#14131f"/>
    </linearGradient>
    <linearGradient id="surface" x1="155" y1="70" x2="1015" y2="318" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#13283c" stop-opacity="0.94"/>
      <stop offset="0.55" stop-color="#111827" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#221827" stop-opacity="0.94"/>
    </linearGradient>
    <linearGradient id="logoBg" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="0.54" stop-color="#102235"/>
      <stop offset="1" stop-color="#1d1724"/>
    </linearGradient>
    <linearGradient id="logoMark" x1="43" y1="66" x2="218" y2="185" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#23d3c3"/>
      <stop offset="0.47" stop-color="#4f8cff"/>
      <stop offset="1" stop-color="#ff5f8f"/>
    </linearGradient>
    <linearGradient id="accentWide" x1="112" y1="60" x2="1096" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#23d3c3"/>
      <stop offset="0.48" stop-color="#4f8cff"/>
      <stop offset="1" stop-color="#ffb454"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0v48" fill="none" stroke="#d8e8ff" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <pattern id="pinGrid" width="88" height="88" patternUnits="userSpaceOnUse">
      <circle cx="7" cy="7" r="1.6" fill="#d8e8ff" opacity="0.24"/>
    </pattern>
    <pattern id="logoGrid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0v32" fill="none" stroke="#d8e8ff" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
    <filter id="softShadow" x="-10%" y="-14%" width="120%" height="128%">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
    <filter id="logoShadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="16" stdDeviation="12" flood-color="#020617" flood-opacity="0.48"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#backdrop)"/>
  <rect width="1200" height="360" rx="28" fill="url(#grid)"/>
  <rect width="1200" height="360" rx="28" fill="url(#pinGrid)" opacity="0.65"/>

  <path d="M-26 320C140 216 256 214 392 287c121 65 250 54 389-34 150-96 300-105 465-28v135H-26z" fill="#22d3ee" opacity="0.08"/>
  <path d="M-30 80c172-45 310-39 415 19 98 54 210 58 337 10 154-58 304-49 508 45V0H-30z" fill="#ff5f8f" opacity="0.08"/>
  <path d="M102 61h996" stroke="url(#accentWide)" stroke-width="2" stroke-linecap="round" opacity="0.88"/>

  <g filter="url(#softShadow)">
    <path d="M92 92c0-18 14-32 32-32h952c18 0 32 14 32 32v176c0 18-14 32-32 32H124c-18 0-32-14-32-32z" fill="url(#surface)" stroke="#d8e8ff" stroke-opacity="0.12"/>
  </g>

  <g transform="translate(162 84) scale(0.75)">
    <rect width="256" height="256" rx="42" fill="url(#logoBg)"/>
    <rect width="256" height="256" rx="42" fill="url(#logoGrid)"/>
    <path d="M0 211c50-34 93-42 130-23 39 20 80 11 126-27v95H0z" fill="#23d3c3" opacity="0.08"/>
    <path d="M0 45c52 17 97 20 137 8 39-13 79-12 119 2V0H0z" fill="#ff5f8f" opacity="0.08"/>

    <g filter="url(#logoShadow)">
      <rect x="36" y="42" width="184" height="148" rx="30" fill="#07111f" stroke="#d8e8ff" stroke-opacity="0.13"/>
      <path d="M59 151 83 81h27l19 45 19-45h27l24 70h-29l-11-37-18 37h-24l-18-37-11 37z" fill="url(#logoMark)"/>
      <path d="M59 151 83 81h27l19 45 19-45h27l24 70" fill="none" stroke="#f8fbff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    </g>

    <g stroke-linecap="round" stroke-linejoin="round">
      <path d="M42 68h35M178 202h36M188 58h21M45 202h24" stroke="#ffb454" stroke-width="6"/>
      <path d="M39 118h28l18-18M189 111h25l15-15M37 169h28l18 18M182 154h28l19 19" fill="none" stroke="#d8e8ff" stroke-opacity="0.26" stroke-width="4"/>
      <circle cx="78" cy="68" r="6" fill="#23d3c3"/>
      <circle cx="178" cy="202" r="6" fill="#ff5f8f"/>
      <circle cx="209" cy="58" r="5" fill="#4f8cff"/>
      <circle cx="69" cy="202" r="5" fill="#ffb454"/>
    </g>

    <g font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="800" text-anchor="middle">
      <text x="128" y="221" fill="#f8fbff" font-size="26" letter-spacing="1.2">WXB</text>
    </g>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="430" y="206" fill="#f8fbff" font-size="84" font-weight="800" letter-spacing="0">Worxbend</text>
  </g>
</svg>
